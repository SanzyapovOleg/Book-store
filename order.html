<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа - "Читаем Вместе"</title>
    <style>
        /* Базовые стили и переменные (Книжная тематика) */
        :root {
            --primary-color: #8b5a2b;
            --secondary-color: #f4f1ea;
            --text-color: #333;
            --accent-color: #d35400;
        }

        body {
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
            background-color: var(--secondary-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Шапка сайта */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1.5rem 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-style: italic;
        }

        nav {
            margin-top: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #f39c12;
        }

        .active-link {
            border-bottom: 2px solid #f39c12;
            padding-bottom: 3px;
        }

        /* Основной контент (Форма) */
        .container {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .section-title {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 2rem;
            border-bottom: 1px solid var(--primary-color);
            display: inline-block;
            padding-bottom: 10px;
        }

        .order-form-wrapper {
            background: white;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e0dcd3;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-family: 'Georgia', serif;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #faf9f7;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .submit-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 3px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
            font-family: 'Georgia', serif;
            font-weight: bold;
        }

        .submit-btn:hover {
            background-color: #b04600;
        }

        /* Подвал */
        footer {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 20px 0;
            margin-top: auto;
        }

        footer p {
            margin: 5px 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>📚 Читаем Вместе</h1>
        <nav>
            <a href="index.html">Каталог книг</a>
            <a href="order.html" class="active-link">Оформление заказа</a>
        </nav>
    </header>

    <div class="container">
        <div class="order-form-wrapper">
            <div style="text-align: center;">
                <h2 class="section-title">Оформление доставки</h2>
            </div>

            <form action="#" method="POST">
                <div class="form-group">
                    <label for="fullname">ФИО получателя:</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Иванов Иван Иванович" required>
                </div>

                <div class="form-group">
                    <label for="book">Выберите книгу (из корзины):</label>
                    <select id="book" name="book" required>
                        <option value="">-- Выберите книгу --</option>
                        <option value="bulgakov">Мастер и Маргарита - 650 ₽</option>
                        <option value="orwell">1984 - 500 ₽</option>
                        <option value="herbert">Дюна - 890 ₽</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="delivery">Способ доставки:</label>
                    <select id="delivery" name="delivery" required>
                        <option value="pickup">Самовывоз из магазина (Бесплатно)</option>
                        <option value="courier">Курьером до двери (+300 ₽)</option>
                        <option value="post">Почта России (+250 ₽)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="address">Адрес доставки:</label>
                    <textarea id="address" name="address" rows="3" placeholder="г. Тюмень, ул. Ленина, д. 1, кв. 10"></textarea>
                </div>

                <button type="submit" class="submit-btn">Подтвердить заказ</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Книжный магазин "Читаем Вместе".</p>
        <p>Адрес: г. Тюмень, ул. Литературная, 10 | Телефон: +7 (3452) 11-22-33</p>
        <p><i>Разработано: Санзяпов О. Д. Билоус Е. Ю. (Группа ИСТН6-24-1)</i></p>
    </footer>

</body>
</html>
